<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乘风2026 · 实时投票监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Helvetica Neue','Microsoft Yahei',Arial,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px}
h1{font-size:2.2em;background:linear-gradient(135deg,#ff6b9d,#c44dff,#6bc5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px}
.card{background:#111130;border:1px solid #2a2a50;border-radius:16px;padding:40px;max-width:500px;width:100%}
.btn{display:inline-block;background:linear-gradient(135deg,#00c853,#00bfa5);color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:1.1em;font-weight:700;cursor:pointer;text-decoration:none;margin:10px;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn.secondary{background:#2a2a50;font-size:.9em}
.status{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;background:#00c853;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,200,83,.4)}70%{box-shadow:0 0 0 8px rgba(0,200,83,0)}100%{box-shadow:0 0 0 0 rgba(0,200,83,0)}}
.url{background:#0a0a30;color:#4BC0C0;padding:10px 16px;border-radius:8px;font-size:.9em;word-break:break-all;margin:15px 0}
.desc{color:#8890b0;font-size:.9em;margin:8px 0;line-height:1.6}
.footer{margin-top:30px;color:#555;font-size:.8em}
.footer a{color:#4BC0C0}
</style>
<script>
function checkServer(){fetch('http://150.158.122.217:8765/api/status').then(r=>r.json()).then(d=>{document.getElementById('statusText').textContent='服务器在线 ('+d.data_points+'个数据点)';document.getElementById('dot').style.background='#00c853'}).catch(()=>{document.getElementById('statusText').textContent='服务器离线';document.getElementById('dot').style.background='#ff4444'})}
</script>
</head>
<body onload="checkServer()">
<div class="card">
  <h1>🌊 乘风2026<br>实时投票数据监控</h1>
  <p class="desc"><span id="dot" class="status"></span><span id="statusText">检测中...</span></p>
  <p class="desc">数据来源: 芒果TV API · 即时刷新 · 7×24小时</p>
  <a href="http://150.158.122.217:8765" class="btn">📊 打开实时监控面板</a>
  <p class="url">http://150.158.122.217:8765</p>
  <p class="desc" style="font-size:.8em;margin-top:15px">⬆️ 点击上方按钮或复制链接在浏览器打开</p>
</div>
<div class="footer">
  <p>🧑‍💻 <a href="https://github.com/iceicea/cf2026" target="_blank">GitHub 仓库</a> · 部署在腾讯云服务器 · 即时调芒果TV接口</p>
</div>
</body>
</html>
