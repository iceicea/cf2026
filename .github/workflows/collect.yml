name: 采集投票数据

on:
  schedule:
    # 每5分钟运行一次 (UTC时间)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 采集投票数据
        run: python3 collect.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "📊 更新投票数据 [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
