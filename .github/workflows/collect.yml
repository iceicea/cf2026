name: 采集投票数据

on:
  schedule:
    # 每5分钟触发一次，但每次内部循环5次（每分钟采集一次）
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # 允许手动触发（立即采集一次）

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 循环采集（每60秒一次，共5次≈5分钟覆盖）
        run: |
          for i in 1 2 3 4 5; do
            echo "============================================"
            echo "📊 第 $i/5 轮采集 $(date +'%H:%M:%S')"
            echo "============================================"

            python3 collect.py

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json

            if git diff --staged --quiet; then
              echo "数据无变化，跳过提交"
            else
              git commit -m "📊 更新投票数据 [$(date +'%Y-%m-%d %H:%M UTC')]"
              git push
            fi

            # 最后一轮不用等待
            if [ $i -lt 5 ]; then
              echo "⏳ 等待60秒后进行下一轮采集..."
              sleep 60
            fi
          done

          echo "✅ 本轮5次采集完成!"
